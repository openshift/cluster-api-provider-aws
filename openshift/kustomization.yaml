apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

components:
- tools/vendor/github.com/openshift/cluster-capi-operator/manifests-gen

resources:
- ../config/default

images:
- name: gcr.io/k8s-staging-cluster-api-aws/cluster-api-aws-controller
  newName: registry.ci.openshift.org/openshift
  newTag: aws-cluster-api-controllers

patches:

# Remove unsubstituted annotation from ServiceAccount
- target:
    kind: ServiceAccount
    name: capa-controller-manager
  patch: |-
    - op: remove
      path: /metadata/annotations/${AWS_CONTROLLER_IAM_ROLE~1#arn~1eks.amazonaws.com~1role-arn

# Add TLS configuration args (substituted by cluster-capi-operator revisiongenerator)
- target:
    kind: Deployment
    name: capa-controller-manager
  patch: |-
    - op: add
      path: /spec/template/spec/containers/0/args/-
      value: "--tls-min-version=${TLS_MIN_VERSION}"
    - op: add
      path: /spec/template/spec/containers/0/args/-
      value: "--tls-cipher-suites=${TLS_CIPHER_SUITES}"



# https://redhat.atlassian.net/browse/OCPCLOUD-3435
- path: patches/remove-awsmachinepool-crd.yaml
- path: patches/remove-awsmachinepool-mutating-webhook.yaml
- path: patches/remove-awsmachinepool-validating-webhook.yaml

# index may not be stable in the JSON patch below but no better way has been identified so far
# Remove awsmachinepools from ClusterRole RBAC rules
# Remove in reverse order (higher indices first) to avoid index shifting
# Rule 21: Remove only awsmachinepools/status (index 0) from the resources array
# Rule 20: Remove entire rule (only contains awsmachinepools/finalizers)
# Rule 18: Remove only awsmachinepools (index 2) from the resources array
- target:
    kind: ClusterRole
    name: capa-manager-role
  patch: |-
    - op: remove
      path: /rules/21/resources/0
    - op: remove
      path: /rules/20
    - op: remove
      path: /rules/18/resources/2
